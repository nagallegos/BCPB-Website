<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Templates | Bomb City Photo Booth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="icon" type="image/png" href="/assets/icons/BCPB_orange.png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body data-redirect-key="templateAppUrl">
    <div id="header" class="sticky-top"></div>

    <section class="section-padding text-center">
      <div class="container">
        <div class="card card-brand card-pad reveal mx-auto" style="max-width: 720px">
          <p class="eyebrow text-uppercase mb-3">Template Gallery</p>
          <h1 class="mb-3">The template gallery has moved</h1>
          <p class="text-muted-custom section-intro mb-4">
            Templates now live in the unified admin and gallery app. You should
            be redirected automatically. If not, use the button below.
          </p>
          <div class="d-flex flex-column flex-sm-row gap-3 justify-content-center">
            <a
              href="#"
              data-config-link="templateAppUrl"
              class="btn btn-brand btn-lg"
            >
              Open Template Gallery
            </a>
            <a href="/info-form/" class="btn btn-outline-brand btn-lg">
              Start Your Inquiry
            </a>
          </div>
        </div>
      </div>
    </section>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/site-config.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
